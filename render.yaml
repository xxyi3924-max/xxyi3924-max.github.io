services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: smart-money-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: X_AUTH_TOKEN
        sync: false
      - key: X_CT0
        sync: false
      - key: X_GUEST_ID
        sync: false
      - key: API_KEY
        sync: false
      - key: MOCK_MODE
        value: false

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: smart-money-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_API_KEY
        sync: false
